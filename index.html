}

function WorkerLedger() {
  const [phones, setPhones] = useState({ kanu: "", sonu: "", didi: "" });
  const [txns, setTxns] = useState([]);
  const [payments, setPayments] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("dashboard");
  const [currentStaff, setCurrentStaff] = useState("");
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    const unsub1 = db
      .collection(TXN_COLLECTION)
      .orderBy("date", "desc")
      .onSnapshot(
        (snap) => {
          setTxns(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
          setLoading(false);
        },
        (err) => {
          console.error("txn listener error", err);
          setLoading(false);
        }
      );
    const unsub2 = db
      .collection(PAYMENT_COLLECTION)
      .orderBy("date", "desc")
      .onSnapshot(
        (snap) => {
          setPayments(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
        },
        (err) => console.error("payment listener error", err)
      );
    return () => {
      unsub1();
      unsub2();
    };
  }, []);

  // ---- send form state
  const [sendWorker, setSendWorker] = useState("kanu");
  const [sendCat, setSendCat] = useState(Object.keys(WORKERS.kanu.categories)[0]);
  const [sendQty, setSendQty] = useState("");
  const [sendDate, setSendDate] = useState(todayStr());

  // ---- receive state
  const [recvWorker, setRecvWorker] = useState("kanu");
  const [recvDate, setRecvDate] = useState(todayStr());
  const [ticked, setTicked] = useState({});

  // ---- payment form state
  const [payWorker, setPayWorker] = useState("kanu");
  const [payAmount, setPayAmount] = useState("");
  const [payDate, setPayDate] = useState(todayStr());
  const [payNote, setPayNote] = useState("");

  // ---- report state
  const [reportWorker, setReportWorker] = useState("kanu");
  const [reportDate, setReportDate] = useState(todayStr());

  // ---- ledger filter
  const [filterWorker, setFilterWorker] = useState("all");
  const [ledgerRange, setLedgerRange] = useState("30");

  const pending = useMemo(() => {
    const p = {};
    for (const wId of Object.keys(WORKERS)) {
      p[wId] = {};
      for (const cId of Object.keys(WORKERS[wId].categories)) p[wId][cId] = 0;
    }
    for (const t of txns) {
      const delta = t.type === "sent" ? t.qty : -t.qty;
      if (p[t.workerId] && p[t.workerId][t.catId] !== undefined) {
        p[t.workerId][t.catId] += delta;
      }
    }
    return p;
  }, [txns]);

  const payable = useMemo(() => {
    const p = { kanu: 0, sonu: 0, didi: 0 };
    for (const t of txns) {
      if (t.type === "received") {
        p[t.workerId] += t.qty * WORKERS[t.workerId].categories[t.catId].rate;
      }
    }
    return p;
  }, [txns]);

  const paidTotal = useMemo(() => {
    const p = { kanu: 0, sonu: 0, didi: 0 };
    for (const pay of payments) p[pay.workerId] += pay.amount;
    return p;
  }, [payments]);

  function totalPendingForWorker(wId) {
    return Object.values(pending[wId]).reduce((a, b) => a + b, 0);
  }

  async function addSend() {
    const qty = parseInt(sendQty, 10);
    if (!qty || qty <= 0 || !currentStaff) return;
    setSaving(true);
    try {
      await db.collection(TXN_COLLECTION).add({
        workerId: sendWorker,
        catId: sendCat,
        qty,
        type: "sent",
        date: sendDate,
        enteredBy: currentStaff,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      setSendQty("");
    } catch (e) {
      alert("Could not save: " + e.message);
    }
    setSaving(false);
  }

  function toggleTick(catId, idx) {
    setTicked((prev) => {
      const set = new Set(prev[catId] || []);
      if (set.has(idx)) set.delete(idx);
      else set.add(idx);
      return { ...prev, [catId]: set };
    });
  }

  function toggleAllForCat(catId, pendingQty) {
    setTicked((prev) => {
      const set = new Set(prev[catId] || []);
      const allChecked = set.size === pendingQty;
      const newSet = allChecked ? new Set() : new Set(Array.from({ length: pendingQty }, (_, i) => i));
      return { ...prev, [catId]: newSet };
    });
  }

  function switchRecvWorker(wId) {
    setRecvWorker(wId);
    setTicked({});
  }

  const totalTicked = Object.values(ticked).reduce((sum, set) => sum + (set ? set.size : 0), 0);

  async function confirmReceive() {
    if (totalTicked === 0 || !currentStaff) return;
    setSaving(true);
    try {
      const batch = db.batch();
      for (const [catId, set] of Object.entries(ticked)) {
        const qty = set ? set.size : 0;
        if (qty > 0) {
          const ref = db.collection(TXN_COLLECTION).doc();
          batch.set(ref, {
            workerId: recvWorker,
            catId,
            qty,
            type: "received",
            date: recvDate,
            enteredBy: currentStaff,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
        }
      }
      await batch.commit();
      setTicked({});
    } catch (e) {
      alert("Could not save: " + e.message);
    }
    setSaving(false);
  }

  async function deleteTxn(id) {
    if (!window.confirm("Remove this entry?")) return;
    await db.collection(TXN_COLLECTION).doc(id).delete();
  }

  async function addPayment() {
    const amount = parseFloat(payAmount);
    if (!amount || amount <= 0 || !currentStaff) return;
    setSaving(true);
    try {
      await db.collection(PAYMENT_COLLECTION).add({
        workerId: payWorker,
        amount,
        date: payDate,
        note: payNote.trim(),
        enteredBy: currentStaff,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      setPayAmount("");
      setPayNote("");
    } catch (e) {
      alert("Could not save: " + e.message);
    }
    setSaving(false);
  }

  async function deletePayment(id) {
    if (!window.confirm("Remove this payment?")) return;
    await db.collection(PAYMENT_COLLECTION).doc(id).delete();
  }

  const RESET_PASSWORD = "bhabhi123";

async function resetAll() {
    var pass = window.prompt("Enter the password to reset all data:");
    if (pass === null) return;
    if (pass !== RESET_PASSWORD) {
      alert("Incorrect password. Data was not reset.");
      return;
    }
    const ok = window.confirm(
      "This clears ALL sent, received, and payment entries for every device using this app. This cannot be undone. Continue?"
    );
    if (!ok) return;
    setSaving(true);
    try {
      const batch1 = db.batch();
      const txnSnap = await db.collection(TXN_COLLECTION).get();
      txnSnap.forEach((d) => batch1.delete(d.ref));
      await batch1.commit();
      const batch2 = db.batch();
      const paySnap = await db.collection(PAYMENT_COLLECTION).get();
      paySnap.forEach((d) => batch2.delete(d.ref));
      await batch2.commit();
      setTicked({});
    } catch (e) {
      alert("Could not reset: " + e.message);
    }
    setSaving(false);
  }

  function buildReportText(wId, date) {
    const w = WORKERS[wId];
    const sentToday = {};
    const receivedTotal = {};
    for (const cId of Object.keys(w.categories)) {
      sentToday[cId] = 0;
      receivedTotal[cId] = 0;
    }
    for (const t of txns) {
      if (t.workerId !== wId) continue;
      if (t.type === "sent" && t.date === date) sentToday[t.catId] += t.qty;
      if (t.type === "received") receivedTotal[t.catId] += t.qty;
    }
    const sentLines = Object.entries(sentToday)
      .filter(([, q]) => q > 0)
      .map(([cId, q]) => `${w.categories[cId].label}: ${q}`)
      .join("\n");
    const totalSentToday = Object.values(sentToday).reduce((a, b) => a + b, 0);

    const pendingLines = Object.entries(pending[wId])
      .filter(([, q]) => q > 0)
      .map(([cId, q]) => `${w.categories[cId].label}: ${q}`)
      .join("\n");
    const totalPending = totalPendingForWorker(wId);

    const payableLines = Object.entries(receivedTotal)
      .filter(([, q]) => q > 0)
      .map(
        ([cId, q]) =>
          `${w.categories[cId].label}: ${q} x ${rupee(w.categories[cId].rate)} = ${rupee(
            q * w.categories[cId].rate
          )}`
      )
      .join("\n");
    const totalPayable = payable[wId];
    const totalPaid = paidTotal[wId];
    const outstanding = totalPayable - totalPaid;

    let msg = `*BhabhiSarees - Daily Report*\n${fmtDate(date)}\n\n`;
    msg += `*Sent today (${w.name})*\n`;
    msg += totalSentToday > 0 ? sentLines + `\nTotal: ${totalSentToday}` : "None";
    msg += `\n\n*Total pending with you (all time)*\n`;
    msg += totalPending > 0 ? pendingLines + `\nTotal: ${totalPending}` : "None";
    msg += `\n\n*Amount payable (for work received back)*\n`;
    msg += totalPayable > 0 ? payableLines + `\nTotal: ${rupee(totalPayable)}` : "None";
    msg += `\n\n*Payment status*\n`;
    msg += `Paid so far: ${rupee(totalPaid)}\nOutstanding: ${rupee(outstanding)}`;
    msg += `\n\nPlease tally and confirm.`;
    return msg;
  }

  const cutoffDate = useMemo(() => {
    const d = new Date();
    d.setDate(d.getDate() - 30);
    return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
  }, []);

  const combinedEntries = useMemo(() => {
    const fromTxns = txns.map((t) => ({ ...t, kind: "txn" }));
    const fromPayments = payments.map((p) => ({ ...p, kind: "payment" }));
    return [...fromTxns, ...fromPayments].sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : 0));
  }, [txns, payments]);

  const filteredTxns = combinedEntries.filter((e) => {
    if (filterWorker !== "all" && e.workerId !== filterWorker) return false;
    if (ledgerRange === "30" && e.date < cutoffDate) return false;
    return true;
  });

  const tabs = [
    { id: "dashboard", label: "Dashboard" },
    { id: "send", label: "Send" },
    { id: "receive", label: "Receive" },
    { id: "payment", label: "Payment" },
    { id: "ledger", label: "Ledger" },
    { id: "report", label: "Report" },
  ];

  if (loading) {
    return React.createElement(
      "div",
      { className: "min-h-screen flex items-center justify-center text-stone-500 text-sm" },
      "Loading ledger..."
    );
  }

  return React.createElement(
    "div",
    { className: "min-h-screen bg-stone-100 text-stone-900" },
    React.createElement(
      "header",
      { className: "bg-stone-900 text-stone-50 px-4 py-4 sticky top-0 z-10" },
      React.createElement(
        "div",
        { className: "max-w-3xl mx-auto flex items-center justify-between" },
        React.createElement(
          "div",
          null,
          React.createElement("h1", { className: "text-lg font-semibold tracking-wide" }, "Worker Job-Work Ledger"),
          React.createElement("p", { className: "text-xs text-stone-400" }, "BhabhiSarees \u00b7 finishing tracker")
        ),
        React.createElement(
          "div",
          { className: "text-right text-xs text-stone-400 flex items-center gap-3" },
          React.createElement(
            "span",
            null,
            new Date().toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" })
          ),
          React.createElement(
            "button",
            {
              onClick: resetAll,
              className: "border border-stone-600 text-stone-300 rounded-md px-2 py-1 hover:bg-stone-800",
            },
            "Reset data"
          )
        )
      )
    ),
    React.createElement(
      "nav",
      { className: "bg-stone-800 sticky top-[60px] z-10" },
      React.createElement(
        "div",
        { className: "max-w-3xl mx-auto flex overflow-x-auto" },
        tabs.map((t) =>
          React.createElement(
            "button",
            {
              key: t.id,
              onClick: () => setTab(t.id),
              className:
                "px-4 py-2.5 text-sm whitespace-nowrap border-b-2 transition-colors " +
                (tab === t.id
                  ? "border-amber-400 text-amber-300 font-medium"
                  : "border-transparent text-stone-300 hover:text-stone-100"),
            },
            t.label
          )
        )
      )
    ),
    React.createElement(
      "div",
      { className: "bg-amber-50 border-b border-amber-200 px-4 py-2" },
      React.createElement(
        "div",
        { className: "max-w-3xl mx-auto flex items-center gap-2 text-sm" },
        React.createElement("span", { className: "text-amber-800 whitespace-nowrap" }, "Staff on duty:"),
        React.createElement(
          "select",
          {
            value: currentStaff,
            onChange: (e) => setCurrentStaff(e.target.value),
            className: "flex-1 border border-amber-300 rounded-md px-2 py-1.5 text-sm bg-white",
          },
          React.createElement("option", { value: "" }, "Select your name"),
          STAFF_LIST.map((name) => React.createElement("option", { key: name, value: name }, name))
        ),
        saving && React.createElement("span", { className: "text-xs text-amber-700" }, "Saving...")
      )
    ),
    React.createElement(
      "main",
      { className: "max-w-3xl mx-auto p-4 pb-16" },

      tab === "dashboard" &&
        React.createElement(
          "div",
          { className: "space-y-4" },
          Object.entries(WORKERS).map(([wId, w]) =>
            React.createElement(
              "div",
              { key: wId, className: "bg-white rounded-lg border border-stone-200 overflow-hidden" },
              React.createElement(
                "div",
                { className: "bg-stone-900 text-stone-50 px-4 py-2.5 flex items-center justify-between" },
                React.createElement("span", { className: "font-medium" }, w.name),
                React.createElement(
                  "span",
                  { className: "text-sm text-amber-300" },
                  "Pending: " + totalPendingForWorker(wId)
                )
              ),
              React.createElement(
                "div",
                { className: "divide-y divide-stone-100" },
                Object.entries(w.categories).map(([cId, c]) =>
                  React.createElement(
                    "div",
                    { key: cId, className: "px-4 py-2 flex items-center justify-between text-sm" },
                    React.createElement(
                      "span",
                      { className: "text-stone-700" },
                      c.label + " ",
                      React.createElement("span", { className: "text-stone-400" }, "(" + rupee(c.rate) + "/pc)")
                    ),
                    React.createElement(
                      "span",
                      {
                        className:
                          "font-medium " + (pending[wId][cId] > 0 ? "text-amber-700" : "text-stone-400"),
                      },
                      pending[wId][cId]
                    )
                  )
                )
              ),
              React.createElement(
                "div",
                { className: "px-4 py-2 bg-stone-50 text-xs text-stone-500 space-y-1" },
                React.createElement(
                  "div",
                  { className: "flex justify-between" },
                  React.createElement("span", null, "Payable for work received back"),
                  React.createElement("span", { className: "font-medium text-stone-700" }, rupee(payable[wId]))
                ),
                React.createElement(
                  "div",
                  { className: "flex justify-between" },
                  React.createElement("span", null, "Paid so far"),
                  React.createElement("span", { className: "font-medium text-stone-700" }, rupee(paidTotal[wId]))
                ),
                React.createElement(
                  "div",
                  { className: "flex justify-between border-t border-stone-200 pt-1" },
                  React.createElement("span", { className: "font-medium" }, "Outstanding"),
                  React.createElement(
                    "span",
                    {
                      className:
                        "font-medium " +
                        (payable[wId] - paidTotal[wId] > 0 ? "text-amber-700" : "text-emerald-700"),
                    },
                    rupee(payable[wId] - paidTotal[wId])
                  )
                )
              )
            )
          )
        ),

      tab === "send" &&
        React.createElement(
          "div",
          { className: "bg-white rounded-lg border border-stone-200 p-4 max-w-md" },
          React.createElement("h2", { className: "font-medium mb-3" }, "Send piece to worker"),
          React.createElement("label", { className: "block text-xs text-stone-500 mb-1" }, "Worker"),
          React.createElement(
            "select",
            {
              className: "w-full border border-stone-300 rounded-md px-3 py-2 mb-3 text-sm",
              value: sendWorker,
              onChange: (e) => {
                setSendWorker(e.target.value);
                setSendCat(Object.keys(WORKERS[e.target.value].categories)[0]);
              },
            },
            Object.entries(WORKERS).map(([wId, w]) => React.createElement("option", { key: wId, value: wId }, w.name))
          ),
          React.createElement("label", { className: "block text-xs text-stone-500 mb-1" }, "Category"),
          React.createElement(
            "select",
            {
              className: "w-full border border-stone-300 rounded-md px-3 py-2 mb-3 text-sm",
              value: sendCat,
              onChange: (e) => setSendCat(e.target.value),
            },
            Object.entries(WORKERS[sendWorker].categories).map(([cId, c]) =>
              React.createElement("option", { key: cId, value: cId }, c.label + " (" + rupee(c.rate) + "/pc)")
            )
          ),
          React.createElement("label", { className: "block text-xs text-stone-500 mb-1" }, "Quantity"),
          React.createElement("input", {

            min: "1",

            value: sendQty,
            onChange: (e) => setSendQty(e.target.value),
            placeholder: "e.g. 2",

          React.createElement("label", { className: "block text-xs text-stone-500 mb-1" }, "Date"),
          React.createElement("input", {

            className: "w-full border border-stone-300 rounded-md px-3 py-2 mb-4 text-sm",
            value: sendDate,
            onChange: (e) => setSendDate(e.target.value),
          }),
          !currentStaff &&
            React.createElement(
              "p",
              { className: "text-xs text-red-600 mb-2" },
              "Select your name in \u201cStaff on duty\u201d above first."
            ),
          React.createElement(
            "button",
            {

            "Record send"

        ),

      tab === "receive" &&
        React.createElement(

            Object.entries(WORKERS).map(([wId, w]) => React.createElement("option", { key: wId, value: wId }, w.name))
          ),
          React.createElement("label", { className: "block text-xs text-stone-500 mb-1" }, "Date"),
          React.createElement("input", {

            className: "w-full border border-stone-300 rounded-md px-3 py-2 mb-4 text-sm",

                ),
                Object.entries(WORKERS[recvWorker].categories).map(([cId, c]) => {
                  const pendingQty = pending[recvWorker][cId];
                  if (pendingQty <= 0) return null;
                  const checkedSet = ticked[cId] || new Set();
                  const allCatChecked = checkedSet.size === pendingQty;
                  return React.createElement(

                    React.createElement(

                      { className: "text-xs text-stone-500 mb-1.5 flex justify-between items-center" },

                    React.createElement(

                    )

                })
              ),
          !currentStaff &&
            React.createElement(

              { className: "text-xs text-red-600 mb-2" },

            ),
          React.createElement(

          )
        ),

      tab === "payment" &&
        React.createElement(
          "div",
          { className: "bg-white rounded-lg border border-stone-200 p-4 max-w-md" },
          React.createElement("h2", { className: "font-medium mb-3" }, "Record payment to worker"),
          React.createElement("label", { className: "block text-xs text-stone-500 mb-1" }, "Worker"),
          React.createElement(
            "select",
            {
              className: "w-full border border-stone-300 rounded-md px-3 py-2 mb-3 text-sm",
              value: payWorker,
              onChange: (e) => setPayWorker(e.target.value),
            },
            Object.entries(WORKERS).map(([wId, w]) => React.createElement("option", { key: wId, value: wId }, w.name))
          ),
          React.createElement(
            "div",
            { className: "text-xs text-stone-500 mb-3 bg-stone-50 rounded-md px-3 py-2" },
            "Payable: ",
            React.createElement("span", { className: "font-medium text-stone-700" }, rupee(payable[payWorker])),
            " \u00b7 Paid: ",
            React.createElement("span", { className: "font-medium text-stone-700" }, rupee(paidTotal[payWorker])),
            " \u00b7 Outstanding: ",
            React.createElement(
              "span",
              { className: "font-medium text-amber-700" },
              rupee(payable[payWorker] - paidTotal[payWorker])
            )
          ),
          React.createElement("label", { className: "block text-xs text-stone-500 mb-1" }, "Amount paid (\u20B9)"),
          React.createElement("input", {
            type: "number",
            min: "1",
            className: "w-full border border-stone-300 rounded-md px-3 py-2 mb-3 text-sm",
            value: payAmount,
            onChange: (e) => setPayAmount(e.target.value),
            placeholder: "e.g. 1500",
          }),
          React.createElement("label", { className: "block text-xs text-stone-500 mb-1" }, "Date"),
          React.createElement("input", {
            type: "date",
            className: "w-full border border-stone-300 rounded-md px-3 py-2 mb-3 text-sm",
            value: payDate,
            onChange: (e) => setPayDate(e.target.value),
          }),
          React.createElement("label", { className: "block text-xs text-stone-500 mb-1" }, "Note (optional)"),
          React.createElement("input", {
            type: "text",
            className: "w-full border border-stone-300 rounded-md px-3 py-2 mb-4 text-sm",
            value: payNote,
            onChange: (e) => setPayNote(e.target.value),
            placeholder: "e.g. Cash, UPI, part payment",
          }),
          !currentStaff &&
            React.createElement(
              "p",
              { className: "text-xs text-red-600 mb-2" },
              "Select your name in \u201cStaff on duty\u201d above first."
            ),
          React.createElement(
            "button",
            {
              onClick: addPayment,
              disabled: !payAmount || parseFloat(payAmount) <= 0 || !currentStaff || saving,
              className: "w-full bg-stone-900 text-white rounded-md py-2 text-sm font-medium disabled:opacity-40",
            },
            "Record payment"
          )
        ),

      tab === "ledger" &&
        React.createElement(
          "div",
          null,
          React.createElement(
            "div",
            { className: "flex items-center gap-2 mb-3 flex-wrap" },
            React.createElement("label", { className: "text-xs text-stone-500" }, "Worker"),
            React.createElement(
              "select",
              {
                className: "border border-stone-300 rounded-md px-2 py-1.5 text-sm",
                value: filterWorker,
                onChange: (e) => setFilterWorker(e.target.value),
              },
              React.createElement("option", { value: "all" }, "All"),
              Object.entries(WORKERS).map(([wId, w]) => React.createElement("option", { key: wId, value: wId }, w.name))
            ),
            React.createElement(
              "div",
              { className: "flex border border-stone-300 rounded-md overflow-hidden ml-auto" },
              React.createElement(
                "button",
                {
                  onClick: () => setLedgerRange("30"),
                  className:
                    "text-xs px-3 py-1.5 " + (ledgerRange === "30" ? "bg-stone-900 text-white" : "bg-white text-stone-600"),
                },
                "Last 30 days"
              ),
              React.createElement(
                "button",
                {
                  onClick: () => setLedgerRange("all"),
                  className:
                    "text-xs px-3 py-1.5 " + (ledgerRange === "all" ? "bg-stone-900 text-white" : "bg-white text-stone-600"),
                },
                "All time"
              )
            )
          ),
          React.createElement(
            "div",
            { className: "bg-white rounded-lg border border-stone-200 overflow-hidden" },
            filteredTxns.length === 0
              ? React.createElement("p", { className: "text-sm text-stone-400 p-4" }, "No entries in this range.")
              : React.createElement(
                  "table",
                  { className: "w-full text-sm" },
                  React.createElement(
                    "thead",
                    null,
                    React.createElement(
                      "tr",
                      { className: "bg-stone-50 text-stone-500 text-xs" },
                      React.createElement("th", { className: "text-left px-3 py-2 font-medium" }, "Date"),
                      React.createElement("th", { className: "text-left px-3 py-2 font-medium" }, "Worker"),
                      React.createElement("th", { className: "text-left px-3 py-2 font-medium" }, "Detail"),
                      React.createElement("th", { className: "text-right px-3 py-2 font-medium" }, "Qty / Amount"),
                      React.createElement("th", { className: "text-left px-3 py-2 font-medium" }, "Type"),
                      React.createElement("th", { className: "text-left px-3 py-2 font-medium" }, "By"),
                      React.createElement("th", { className: "px-3 py-2" })
                    )
                  ),
                  React.createElement(
                    "tbody",
                    { className: "divide-y divide-stone-100" },
                    filteredTxns.map((e) => {
                      const isPayment = e.kind === "payment";
                      return React.createElement(
                        "tr",
                        { key: (isPayment ? "p" : "t") + e.id },
                        React.createElement("td", { className: "px-3 py-2 text-stone-600" }, fmtDate(e.date)),
                        React.createElement("td", { className: "px-3 py-2" }, WORKERS[e.workerId].name),
                        React.createElement(
                          "td",
                          { className: "px-3 py-2 text-stone-600" },
                          isPayment ? e.note || "Payment" : WORKERS[e.workerId].categories[e.catId].label
                        ),
                        React.createElement(
                          "td",
                          { className: "px-3 py-2 text-right font-medium" },
                          isPayment ? rupee(e.amount) : e.qty
                        ),
                        React.createElement(
                          "td",
                          { className: "px-3 py-2" },
                          React.createElement(
                            "span",
                            {
                              className:
                                "text-xs px-2 py-0.5 rounded-full font-medium " +
                                (isPayment
                                  ? "bg-blue-100 text-blue-800"
                                  : e.type === "sent"
                                  ? "bg-amber-100 text-amber-800"
                                  : "bg-emerald-100 text-emerald-800"),
                            },
                            isPayment ? "Payment" : e.type === "sent" ? "Sent" : "Received"
                          )
                        ),
                        React.createElement("td", { className: "px-3 py-2 text-stone-500" }, e.enteredBy || "-"),
                        React.createElement(
                          "td",
                          { className: "px-3 py-2 text-right" },
                          React.createElement(
                            "button",
                            {
                              onClick: () => (isPayment ? deletePayment(e.id) : deleteTxn(e.id)),
                              className: "text-xs text-stone-400 hover:text-red-600",
                            },
                            "Remove"
                          )
                        )
                      );
                    })
                  )
                )
          )
        ),

      tab === "report" &&
        React.createElement(
          "div",
          { className: "bg-white rounded-lg border border-stone-200 p-4 max-w-md" },
          React.createElement("h2", { className: "font-medium mb-3" }, "WhatsApp daily report"),
          React.createElement("label", { className: "block text-xs text-stone-500 mb-1" }, "Worker"),
          React.createElement(
            "select",
            {
              className: "w-full border border-stone-300 rounded-md px-3 py-2 mb-3 text-sm",
              value: reportWorker,
              onChange: (e) => setReportWorker(e.target.value),
            },
            Object.entries(WORKERS).map(([wId, w]) => React.createElement("option", { key: wId, value: wId }, w.name))
          ),
          React.createElement("label", { className: "block text-xs text-stone-500 mb-1" }, "Date"),
          React.createElement("input", {
            type: "date",
            className: "w-full border border-stone-300 rounded-md px-3 py-2 mb-3 text-sm",
            value: reportDate,
            onChange: (e) => setReportDate(e.target.value),
          }),
          React.createElement(
            "label",
            { className: "block text-xs text-stone-500 mb-1" },
            "Worker's WhatsApp number (optional, e.g. 91XXXXXXXXXX)"
          ),
          React.createElement("input", {
            type: "text",
            className: "w-full border border-stone-300 rounded-md px-3 py-2 mb-4 text-sm",
            value: phones[reportWorker],
            onChange: (e) => setPhones((p) => ({ ...p, [reportWorker]: e.target.value })),
            placeholder: "91XXXXXXXXXX",
          }),
          React.createElement(
            "div",
            {
              className:
                "bg-stone-50 border border-stone-200 rounded-md p-3 text-sm whitespace-pre-wrap mb-4 font-mono text-xs leading-relaxed",
            },
            buildReportText(reportWorker, reportDate)
          ),
          React.createElement(
            "div",
            { className: "flex gap-2" },
            React.createElement(
              "button",
              {
                onClick: () => navigator.clipboard.writeText(buildReportText(reportWorker, reportDate)),
                className: "flex-1 border border-stone-300 rounded-md py-2 text-sm font-medium",
              },
              "Copy text"
            ),
            React.createElement(
              "a",
              {
                href:
                  "https://wa.me/" +
                  (phones[reportWorker] || "") +
                  "?text=" +
                  encodeURIComponent(buildReportText(reportWorker, reportDate)),
                target: "_blank",
                rel: "noreferrer",
                className: "flex-1 bg-emerald-600 text-white rounded-md py-2 text-sm font-medium text-center",
              },
              "Send on WhatsApp"
            )
          )
        )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(WorkerLedger));
</script>
</body></html>
